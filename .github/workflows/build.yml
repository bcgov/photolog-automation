name: Build Windows .exe

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name Photolog `
            --collect-all customtkinter `
            --exclude-module photolog.ui.dev_tab `
            --exclude-module photolog.core.dev_fixtures `
            photolog/__main__.py

      - name: Sanity check
        run: |
          dir dist
          if (!(Test-Path dist/Photolog.exe)) { throw "Build failed" }

      - uses: actions/upload-artifact@v4
        with:
          name: Photolog-${{ github.sha }}
          path: dist/Photolog.exe
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Photolog.exe
